<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - ShopWave</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="auth-page">
    <section class="auth-card">
        <h1>Create account</h1>
        <form th:action="@{/register}" th:object="${registerForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                Your name
                <input th:field="*{name}" type="text" placeholder="Full name" required>
                <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </label>
            <label>
                Email
                <input th:field="*{email}" type="email" placeholder="you@example.com" required>
                <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </label>
            <label>
                Password
                <input th:field="*{password}" type="password" placeholder="At least 6 characters" minlength="6" required>
                <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </label>
            <button type="submit">Create account</button>
        </form>
        <p>Already have an account?</p>
        <a class="secondary-action" th:href="@{/login}">Login now</a>
    </section>
</main>
</body>
</html>
