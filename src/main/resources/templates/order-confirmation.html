<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Confirmed</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments/header :: siteHeader}"></div>

    <main class="narrow">
        <section class="confirmation">
            <p class="flash" th:if="${message}" th:text="${message}"></p>
            <h1 th:text="${'Thanks, ' + order.customerName + '!'}">Thanks!</h1>
            <p th:text="${'We sent an order receipt to ' + order.email + '.'}">Receipt message</p>
            <h2 th:text="${'Order #' + order.id}">Order</h2>

            <div class="order-lines">
                <div class="summary-row" th:each="item : ${order.items}">
                    <span th:text="${item.productName + ' x ' + item.quantity}">Item</span>
                    <strong th:text="${#numbers.formatCurrency(item.lineTotal)}">Total</strong>
                </div>
                <div class="summary-row total">
                    <span>Total paid</span>
                    <strong th:text="${#numbers.formatCurrency(order.total)}">$0.00</strong>
                </div>
            </div>

            <a class="primary-action" th:href="@{/}">Continue shopping</a>
        </section>
    </main>
</div>
</body>
</html>
