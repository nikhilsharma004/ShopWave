<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.name + ' - ShopWave'}">Product - ShopWave</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="product-detail-page">
    <section class="product-detail">
        <div class="detail-image">
            <img th:src="${product.imageUrl}" th:alt="${product.name}">
        </div>

        <div class="detail-info">
            <a class="detail-category" th:href="@{/(query=${product.category})}" th:text="${product.category}">Category</a>
            <h1 th:text="${product.name}">Product name</h1>
            <div class="rating">
                <span>★★★★☆</span>
                <small th:text="${'(' + (product.stock * 7) + ' ratings)'}">(120 ratings)</small>
            </div>
            <p th:text="${product.description}">Description</p>
            <strong class="price" th:text="${#numbers.formatCurrency(product.price)}">$0.00</strong>
            <p class="delivery">FREE delivery by tomorrow</p>
            <p class="stock" th:text="${product.stock + ' items in stock'}">In stock</p>
        </div>

        <aside class="buy-box">
            <strong th:text="${#numbers.formatCurrency(product.price)}">$0.00</strong>
            <p>FREE delivery by tomorrow. Cash on delivery available.</p>
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Add to Cart</button>
            </form>
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="buy-now" type="submit">Buy Now</button>
            </form>
            <a class="secondary-action" th:href="@{/}">Back to store</a>
        </aside>
    </section>
</main>
</body>
</html>
