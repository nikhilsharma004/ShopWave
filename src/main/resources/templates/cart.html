<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Cart</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments/header :: siteHeader}"></div>

    <main class="narrow">
        <h1>Your cart</h1>

        <section class="empty-state" th:if="${cart.empty}">
            <h2>Your cart is empty</h2>
            <a th:href="@{/}">Start shopping</a>
        </section>

        <section th:unless="${cart.empty}" class="cart-layout">
            <div class="cart-items">
                <article class="cart-item" th:each="item : ${cart.items}">
                    <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}">
                    <div>
                        <h2 th:text="${item.product.name}">Product</h2>
                        <p th:text="${#numbers.formatCurrency(item.product.price)}">Price</p>
                        <div class="quantity-controls">
                            <form th:action="@{/cart/decrease/{id}(id=${item.product.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" aria-label="Decrease quantity">-</button>
                            </form>
                            <span th:text="${item.quantity}">1</span>
                            <form th:action="@{/cart/increase/{id}(id=${item.product.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" aria-label="Increase quantity">+</button>
                            </form>
                        </div>
                    </div>
                    <div class="line-total">
                        <strong th:text="${#numbers.formatCurrency(item.subtotal)}">Total</strong>
                        <form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="link-button" type="submit">Remove</button>
                        </form>
                    </div>
                </article>
            </div>

            <aside class="summary">
                <h2>Order summary</h2>
                <div class="summary-row">
                    <span>Items</span>
                    <span th:text="${cart.itemCount}">0</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <strong th:text="${#numbers.formatCurrency(cart.total)}">$0.00</strong>
                </div>
                <a class="primary-action" th:href="@{/checkout}">Checkout</a>
            </aside>
        </section>
    </main>
</div>
</body>
</html>
