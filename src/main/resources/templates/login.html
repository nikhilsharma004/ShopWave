<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - ShopWave</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="auth-page">
    <section class="auth-card">
        <h1>Login</h1>
        <p class="auth-message success" th:if="${message}" th:text="${message}"></p>
        <p class="auth-message error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                Email
                <input type="email" name="email" placeholder="you@example.com" required>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Enter password" required>
            </label>
            <button type="submit">Login</button>
        </form>
        <div class="demo-login">
            <strong>Demo login</strong>
            <span>Email: demo@shopwave.com</span>
            <span>Password: password123</span>
        </div>
        <p>New to ShopWave?</p>
        <a class="secondary-action" th:href="@{/register}">Create your account</a>
    </section>
</main>
</body>
</html>
